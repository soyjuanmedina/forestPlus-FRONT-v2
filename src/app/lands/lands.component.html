<div class="page-header" style="margin-bottom: 2rem;">
  <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">{{ 'LANDS.TITLE' | translate }} 🌍</h1>
  <p style="color: var(--color-text-light);">{{ 'LANDS.SUBTITLE' | translate }}</p>
</div>

<div class="lands-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem;">
  <!-- Loader -->
  <div *ngIf="loading" class="glass-card" style="grid-column: 1 / -1; text-align: center; padding: 3rem;">
    <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--color-primary); margin-bottom: 1rem;"></i>
    <p>{{ 'LANDS.LOADING' | translate }}</p>
  </div>

  <div *ngFor="let land of lands" class="glass-card land-card" style="padding: 0; overflow: hidden; display: flex; flex-direction: column;">
    <div class="land-image" style="height: 200px; background: #e9edc9; position: relative; overflow: hidden;">
      <img *ngIf="land.picture" [src]="land.picture" style="width: 100%; height: 100%; object-fit: cover;">
      <div *ngIf="!land.picture" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--color-primary); opacity: 0.5;">
        <i class="fa-solid fa-image" style="font-size: 2rem;"></i>
      </div>
      <div *ngIf="land.isFull" class="status-badge" style="position: absolute; top: 1rem; right: 1rem; background: var(--color-danger); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;">
        {{ 'LANDS.FULL' | translate }}
      </div>
    </div>
    <div style="padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column;">
      <h3 style="margin-bottom: 0.5rem;">{{ land.name }}</h3>
      <div class="land-description" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; margin-bottom: 1rem; color: var(--color-text-light); font-size: 0.9rem;" [innerHTML]="land.description || ('LANDS.NO_DESCRIPTION' | translate)">
      </div>
      
      <div class="land-stats" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: auto; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.05);">
        <div>
          <span style="display: block; font-size: 0.7rem; color: var(--color-text-light); text-transform: uppercase;">{{ 'LANDS.AREA' | translate }}</span>
          <span style="font-weight: 700;">{{ land.area }} m²</span>
        </div>
        <div>
          <span style="display: block; font-size: 0.7rem; color: var(--color-text-light); text-transform: uppercase;">{{ 'LANDS.CAPACITY' | translate }}</span>
          <span style="font-weight: 700;">{{ land.maxTrees }} {{ 'LANDS.TREES' | translate }}</span>
        </div>
      </div>

      <button [disabled]="land.isFull" [routerLink]="['/lands', land.id]" class="btn btn-primary" style="margin-top: 1.5rem; width: 100%; border-radius: 12px; font-size: 14px;">
        {{ land.isFull ? ('LANDS.FULL_BUTTON' | translate) : ('LANDS.PLANT_BUTTON' | translate) }}
      </button>
    </div>
  </div>
</div>
