<div class="admin-page animate-fade-in">
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h1>{{ 'ADMIN_LANDS.TITLE' | translate }}</h1>
      <p>{{ 'ADMIN_LANDS.SUBTITLE' | translate }}</p>
    </div>
    <button (click)="openNew()" class="btn btn-primary">
      <i class="fas fa-plus"></i> {{ 'ADMIN_LANDS.ADD_BUTTON' | translate }}
    </button>
  </div>

  <div *ngIf="loading" class="loading-state">
    <div class="spinner"></div>
    <p>{{ 'ADMIN_PAGE.LOADING' | translate }}</p>
  </div>

  <div *ngIf="!loading" class="lands-grid">
    <div *ngFor="let land of lands" class="land-card">
      <div class="land-image" [style.background-image]="'url(' + land.picture + ')'"></div>
      <div class="land-info">
        <h3>{{ land.name }}</h3>
        <p class="location"><i class="fas fa-map-marker-alt"></i> {{ land.location }}</p>
        <div class="stats">
          <span><i class="fas fa-expand-arrows-alt"></i> {{ land.area }}m²</span>
          <span><i class="fas fa-tree"></i> {{ land.maxTrees }} máx.</span>
        </div>
        <div class="card-actions">
          <button (click)="editLand(land)" class="btn btn-secondary btn-sm">{{ 'COMMON.EDIT' | translate }}</button>
          <button (click)="deleteLand(land.id)" class="btn btn-danger btn-sm">{{ 'COMMON.DELETE' | translate }}</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Edición/Creación -->
  <div *ngIf="editingLand" class="modal-overlay">
    <div class="modal-card scrollable-modal">
      <h3>{{ isNew ? ('LAND_MODAL.NEW_TITLE' | translate) : ('LAND_MODAL.EDIT_TITLE' | translate) }}</h3>
      
      <div class="form-group">
        <label>{{ 'LAND_MODAL.NAME' | translate }}</label>
        <input [(ngModel)]="editingLand.name" class="form-control" [placeholder]="'LAND_MODAL.NAME_PLACEHOLDER' | translate">
      </div>

      <div class="form-group">
        <label>{{ 'LAND_MODAL.LOCATION' | translate }}</label>
        <input [(ngModel)]="editingLand.location" class="form-control" [placeholder]="'LAND_MODAL.LOCATION_PLACEHOLDER' | translate">
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>{{ 'LAND_MODAL.AREA' | translate }}</label>
          <input type="number" [(ngModel)]="editingLand.area" class="form-control">
        </div>
        <div class="form-group half">
          <label>{{ 'LAND_MODAL.CAPACITY' | translate }}</label>
          <input type="number" [(ngModel)]="editingLand.maxTrees" class="form-control">
        </div>
      </div>

      <div class="form-group">
        <label>{{ 'LAND_MODAL.IMAGE_URL' | translate }}</label>
        <input [(ngModel)]="editingLand.picture" class="form-control">
      </div>

      <div class="form-group">
        <label>{{ 'LAND_MODAL.DESCRIPTION' | translate }}</label>
        <textarea [(ngModel)]="editingLand.description" class="form-control" rows="3"></textarea>
      </div>

      <div class="modal-actions">
        <button (click)="cancelEdit()" class="btn btn-secondary">{{ 'LAND_MODAL.CANCEL' | translate }}</button>
        <button (click)="saveLand()" class="btn btn-primary">
          {{ isNew ? ('LAND_MODAL.CREATE' | translate) : ('LAND_MODAL.SAVE' | translate) }}
        </button>
      </div>
    </div>
  </div>

  <app-status-modal
    [visible]="statusModal.visible"
    [type]="statusModal.type"
    [title]="statusModal.title"
    [message]="statusModal.message"
    (close)="closeStatus()"
  ></app-status-modal>

  <app-confirm-modal
    [visible]="confirmModal.visible"
    [message]="confirmModal.message"
    (confirm)="confirmDeleteLand()"
    (cancel)="cancelDelete()"
  ></app-confirm-modal>
</div>
